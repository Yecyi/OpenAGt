name: PR checks

on:
  pull_request:
  push:

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check audit policy
        run: bun run check:audit-policy

      - name: Check source integrity
        run: bun run check:integrity

      - name: Typecheck packages/openagt
        working-directory: packages/openagt
        run: bun typecheck

      - name: Typecheck packages/app
        working-directory: packages/app
        run: bun typecheck

      - name: Typecheck packages/enterprise
        working-directory: packages/enterprise
        run: bun typecheck

      - name: Typecheck packages/console/app
        working-directory: packages/console/app
        run: bun typecheck

      - name: Typecheck packages/shared
        working-directory: packages/shared
        run: bun typecheck

      - name: Typecheck packages/ui
        working-directory: packages/ui
        run: bun typecheck

      - name: Typecheck packages/sdk/js
        working-directory: packages/sdk/js
        run: bun typecheck

      - name: Typecheck packages/plugin
        working-directory: packages/plugin
        run: bun typecheck

      - name: Typecheck packages/console/core
        working-directory: packages/console/core
        run: bun typecheck

      - name: Typecheck packages/function
        working-directory: packages/function
        run: bun typecheck

  test:
    name: Test packages/openagt
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        working-directory: packages/sdk/js
        run: bun run script/build.ts

      - name: Run focused tests (PR gate)
        working-directory: packages/openagt
        run: bun test --bail --timeout=60000 --testPathIgnorePatterns "test/cli/tui"
