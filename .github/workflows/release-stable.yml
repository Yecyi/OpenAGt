name: Release Stable

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version to publish
        required: true
        default: "1.16.0"
      release_kind:
        description: Release kind
        required: true
        default: "rc"
        type: choice
        options:
          - rc
          - ga

permissions:
  contents: write

env:
  OPENAGT_CHANNEL: latest
  OPENAGT_RELEASE: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      OPENAGT_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release baseline
        run: bun run release:verify

      - name: Generate release notes
        run: bun run release:notes --version $OPENAGT_VERSION --kind ${{ inputs.release_kind }} --output dist/release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes.md

  build:
    needs: validate
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: macos-15-intel
          - runner: macos-14
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    env:
      OPENAGT_VERSION: ${{ inputs.version }}
      AZURE_TRUSTED_SIGNING_CONFIGURED: ${{ secrets.AZURE_TRUSTED_SIGNING_CLIENT_ID != '' && secrets.AZURE_TRUSTED_SIGNING_TENANT_ID != '' && secrets.AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID != '' && secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' && secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME != '' && secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun run --cwd packages/sdk/js script/build.ts

      - name: Build platform release asset
        run: bun run --cwd packages/openagt script/build.ts --single --archive --no-upload --skip-install

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.4

      - name: Build Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH="$env:USERPROFILE\\.dotnet\\tools;$env:PATH"
          .\packages\openagt\script\build-windows-installer.ps1 -Version $env:OPENAGT_VERSION

      - name: Require Windows signing configuration for GA
        if: runner.os == 'Windows' && inputs.release_kind == 'ga' && env.AZURE_TRUSTED_SIGNING_CONFIGURED != 'true'
        shell: pwsh
        run: |
          throw "GA Windows releases require Azure Trusted Signing secrets. Use release_kind=rc for unsigned builds."

      - name: Azure login for Trusted Signing
        if: runner.os == 'Windows' && inputs.release_kind == 'ga' && env.AZURE_TRUSTED_SIGNING_CONFIGURED == 'true'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_TRUSTED_SIGNING_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TRUSTED_SIGNING_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID }}

      - name: Sign Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          OPENAGT_REQUIRE_WINDOWS_SIGNING: ${{ inputs.release_kind == 'ga' && '1' || '0' }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          .\script\sign-windows.ps1 `
            .\packages\openagt\dist\openagt-windows-x64\release\bin\openagt.exe `
            .\packages\openagt\dist\OpenAGt-Setup-x64.msi

      - name: Repack Windows ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item .\packages\openagt\dist\openagt-windows-x64.zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path .\packages\openagt\dist\openagt-windows-x64\release\* -DestinationPath .\packages\openagt\dist\openagt-windows-x64.zip -Force

      - name: Smoke packaged binary
        run: bun run script/release-smoke.ts

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: |
            packages/openagt/dist/*.zip
            packages/openagt/dist/*.tar.gz
            packages/openagt/dist/*.msi

  finalize:
    needs: build
    runs-on: ubuntu-latest
    env:
      OPENAGT_VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: packages/openagt/dist

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: packages/openagt/dist

      - name: Generate checksums
        run: bun run script/release-checksums.ts --dir packages/openagt/dist --output packages/openagt/dist/SHA256SUMS.txt

      - name: Generate SBOM
        run: bun run script/release-sbom.ts --output packages/openagt/dist/sbom.spdx.json

      - name: Publish release assets
        shell: bash
        run: |
          TAG="v${OPENAGT_VERSION}"
          if [ "${{ inputs.release_kind }}" = "rc" ]; then
            TAG="v${OPENAGT_VERSION}-rc.1"
          fi
          PRERELEASE_ARGS=()
          if [ "${{ inputs.release_kind }}" = "rc" ]; then
            PRERELEASE_ARGS+=(--prerelease)
          fi
          git fetch --tags origin
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag "$TAG"
            git push origin "refs/tags/$TAG"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft=false --title "$TAG" --notes-file packages/openagt/dist/release-notes.md "${PRERELEASE_ARGS[@]}"
          else
            gh release create "$TAG" --title "$TAG" --notes-file packages/openagt/dist/release-notes.md "${PRERELEASE_ARGS[@]}"
          fi
          gh release upload "$TAG" packages/openagt/dist/* --clobber
