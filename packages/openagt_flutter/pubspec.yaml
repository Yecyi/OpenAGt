name: opencode_flutter
description: Native mobile client for OpenCode AI coding agent
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_markdown: ^0.6.22
  markdown: ^7.2.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  uuid: ^4.3.3
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Newsreader
      fonts:
        - asset: fonts/Newsreader-VariableFont.ttf
    - family: PublicSans
      fonts:
        - asset: fonts/PublicSans-VariableFont.ttf
